<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Piyaa 🌙 - My Heart's Confession</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>">
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="particles" id="particles-js"></div>
  
  <audio id="bg-music" src="music.mp3" loop></audio>
  <audio id="click-sound" src="click-sound.mp3"></audio>
  <audio id="romantic-music" src="romantic-music.mp3" loop></audio>
  <audio id="heartbeat-sound" src="heartbeat.mp3"></audio>
  <audio id="paper-sound" src="paper.mp3"></audio>

  <div class="moon-container">
    <div class="moon"></div>
    <div class="moon-glow"></div>
    <div class="moon-crater" style="top: 20%; left: 30%; width: 15px; height: 15px;"></div>
    <div class="moon-crater" style="top: 40%; left: 60%; width: 20px; height: 20px;"></div>
    <div class="moon-crater" style="top: 70%; left: 40%; width: 12px; height: 12px;"></div>
  </div>

  <div class="floating-hearts">
    <!-- Hearts will be generated by JS -->
  </div>

  <div class="music-control">
    <i class="fas fa-volume-up" id="volume-icon"></i>
    <div class="tooltip">Toggle Music</div>
  </div>

  <div class="main-container">
    <div class="content-box">
      <div class="photo-container">
        <div class="photo-frame">
          <img id="displayed-photo" src="foto1.jpg" alt="Foto untuk Piyaa">
          <img id="next-photo" class="hidden" src="" alt="">
          <div class="photo-reflection"></div>
        </div>
        <div class="photo-sparkles"></div>
      </div>
      <div class="letter-container">
        <div class="letter-paper">
          <div id="letter-text">Hai Piyaa... loading suratnya ya~</div>
        </div>
      </div>
      <div class="button-container">
        <button id="next-btn" class="glow">
          <span class="btn-text">Pencet aku lagi</span>
          <span class="btn-heart">❤</span>
        </button>
      </div>
    </div>
  </div>

  <div class="popup hidden" id="popup">
    <button class="popup-close-btn" onclick="closePopup()">
      <i class="fas fa-times"></i>
    </button>
    <div class="popup-overlay"></div>
    <div class="envelope-container">
      <div class="envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-body"></div>
        <div class="envelope-shine"></div>
        <div class="envelope-letter">
          <div class="envelope-letter-content">
            <p>Untuk Piyaa Tercinta...</p>
          </div>
        </div>
      </div>
      <div class="letter">
        <div class="letter-content">
          <div class="letter-header">
            <h2>Untuk Piyaa Tercinta <span class="heart">❤</span></h2>
            <div class="letter-date">Hari yang Spesial • 2023</div>
          </div>
          <div id="popup-text"></div>
          <div class="letter-footer">
            <button onclick="closePopup()">
              <span>Kirim Jawabanmu</span>
              <i class="fas fa-heart"></i>
            </button>
          </div>
        </div>
        <div class="letter-seal">
          <div class="seal-inner">P</div>
        </div>
      </div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
